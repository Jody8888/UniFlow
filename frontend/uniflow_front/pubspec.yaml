name: Uniflow
description: 西安交通大学校园通知个性化客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_html: ^3.0.0
  intl: ^0.20.2
  provider: ^6.1.5
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"
  image_path: "assets/icon.png"
